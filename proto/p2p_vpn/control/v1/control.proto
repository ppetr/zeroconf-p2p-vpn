syntax = "proto3";
// edition = "2024";

package p2p_vpn.control.v1;

// The fields and their numbers match directly
// https://github.com/googleapis/googleapis/blob/master/google/rpc/status.proto
message Status {
  // The status code, which should be an enum value of thin_status::ErrorCode
  // (which is just a gRPC Status code).
  int32 code = 1;
  // An optional text description of the error.
  optional string message = 2;
  // repeated google.protobuf.Any details = 3;
}

// Once a QUIC connection is established, both parties are required to send a
// Advertise control message, otherwise they can't route traffic to each other.
//
// Afterwards any party can transmit an asynchronous control message any time,
// for example to update routes.
message ControlRequest {
  oneof command {
    Advertise advertise = 2;
  }
}

message ControlResponse {
  // This status represents a recoverable error. A non-recoverable error is
  // instead translated to closing the QUIC  connection, with the closing
  // `error_code` directly copied from a `ThinStatus::code_raw()` (which is
  // just a gRPC Status code).
  Status status = 1;
}

message HostAddress {
  // The host's generated address (IPv6, or less commonly IPv4) together with
  // an appropriate prefix length in the CIDR notation.
  // See the Rust function `generate_signed_ip` for details how these addresses
  // are constructed.
  string peer_network = 1;
  // Cryptographic signature of the address by the peer's secret key.
  bytes peer_network_signature = 2;
}

// Advertises at which addresses the sender can be reached. Depending on the
// peer's configuration it might accept only some or none of them (in the
// latter case it triggers a QUIC `close` frame).
message Advertise {
  repeated HostAddress own_addresses = 2;
}
